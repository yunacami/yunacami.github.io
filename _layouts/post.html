---
layout: default
---
<article class="post">
  <header class="post-header">
    <div class="post-meta">
      <span class="meta-badge">每日早报</span>
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y年%m月%d日 %H:%M" }} (东京时间)</time>
    </div>
    <h1>{{ page.title }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <nav class="post-nav">
    {% if page.next %}<a class="post-nav-link prev" href="{{ page.next.url | relative_url }}">← {{ page.next.date | date: "%m月%d日" }}</a>{% else %}<span></span>{% endif %}
    {% if page.previous %}<a class="post-nav-link next" href="{{ page.previous.url | relative_url }}">{{ page.previous.date | date: "%m月%d日" }} →</a>{% endif %}
  </nav>
</article>
